<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SystemVerilog Visual Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-cpu"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
        <span>SV Visual Sim</span>
      </div>
      <div class="actions">
        <button id="btn-simulate" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Simulate
        </button>
      </div>
    </header>

    <main class="app-content">
      <div id="pane-editor" class="split-pane">
        <div class="pane-header">Source Code (Editor)</div>
        <div id="editor-container"></div>
      </div>
      
      <div id="pane-visualizer" class="split-pane">
        <div id="pane-canvas" class="split-pane">
          <div class="pane-header">Visualizer</div>
          <div id="canvas-container">
            <canvas id="visualizer-canvas"></canvas>
          </div>
        </div>
        
        <div id="pane-timeline" class="split-pane">
          <div class="pane-header">Timeline Engine
            <span id="current-time-display">0ns</span>
          </div>
          <div id="timeline-container">
            <input type="range" id="time-scrubber" min="0" max="100" value="0" />
            <div id="signals-view"></div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
